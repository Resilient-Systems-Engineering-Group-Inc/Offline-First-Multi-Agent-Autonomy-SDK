[package]
name = "sdk-operator"
version = "0.1.0"
edition = "2021"
description = "Kubernetes operator for the Multi-Agent SDK"
license = "MIT OR Apache-2.0"

[dependencies]
k8s-openapi = { version = "0.20", features = ["v1.28"] }
kube = { version = "0.87", features = ["runtime", "derive"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
kube-derive = "0.87"
