[package]
name = "advanced-monitoring"
version = "0.1.0"
edition = "2021"
description = "Advanced monitoring and alerting for the SDK"
license = "MIT OR Apache-2.0"

[dependencies]
prometheus = "0.13"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.11", features = ["json"] }
email-templates = "0.9"
slack-messenger = "1.0"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
