[package]
name = "iot-interface"
version = "0.1.0"
edition = "2021"
authors = ["Your Name"]
description = "IoT sensor and actuator interfaces for offline‑first multi‑agent systems"
license = "MIT OR Apache-2.0"
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
async-trait = "0.1"
thiserror = "1.0"
tracing = "0.1"
bytes = "1.0"
futures = "0.3"

# Protocol libraries
rumqttc = { version = "0.21", optional = true }  # MQTT client
coap = { version = "0.11", optional = true }     # CoAP
tokio-modbus = { version = "0.8", optional = true } # Modbus
ros2-client = { path = "../ros2-adapter", optional = true }
cloud-integration = { path = "../cloud-integration", optional = true }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tempfile = "3.0"

[features]
default = ["mqtt", "coap", "modbus", "ros2"]
mqtt = ["dep:rumqttc", "cloud-integration"]
coap = ["dep:coap"]
modbus = ["dep:tokio-modbus"]
ros2 = ["dep:ros2-client"]