[package]
name = "multi-tenancy"
version = "0.1.0"
edition = "2021"
description = "Multi-tenancy support for the Multi-Agent SDK"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "sqlite"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
auth = { path = "../auth", version = "0.1.0" }
