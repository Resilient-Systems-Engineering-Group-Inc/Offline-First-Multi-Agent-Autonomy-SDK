[package]
name = "rule-engine"
version = "0.1.0"
edition = "2021"
description = "Business rule engine for the Multi-Agent SDK"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
pest = "2.7"
pest_derive = "2.7"
regex = "1.10"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
