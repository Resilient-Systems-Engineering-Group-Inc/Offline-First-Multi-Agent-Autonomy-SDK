[package]
name = "graphql-api"
version = "0.1.0"
edition = "2021"
description = "GraphQL API for the SDK"
license = "MIT OR Apache-2.0"

[dependencies]
async-graphql = { version = "7.0", features = ["chrono", "uuid", "dataloader"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

# Internal dependencies
database = { path = "../database", version = "0.1.0" }
auth = { path = "../auth", version = "0.1.0" }
workflow-orchestration = { path = "../workflow-orchestration", version = "0.1.0" }

[dev-dependencies]
reqwest = { version = "0.11", features = ["json"] }
tokio-test = "0.4"
