[package]
name = "zero-knowledge-proofs"
version = "0.1.0"
edition = "2021"
description = "Zero-knowledge proofs for privacy-preserving verification"
license = "MIT OR Apache-2.0"

[dependencies]
bellman = "0.14"
circuit = "0.1"
ff = "0.13"
group = "0.13"
pairing = "0.23"
rand_core = "0.6"
sha2 = "0.10"
blake2 = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }

[dev-dependencies]
tempfile = "3.8"
