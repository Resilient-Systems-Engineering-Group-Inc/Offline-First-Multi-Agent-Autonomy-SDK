[package]
name = "distributed-logging"
version = "0.1.0"
edition = "2021"
description = "Distributed logging for multi‑agent systems"
license = "MIT OR Apache-2.0"
authors = ["Offline-First Multi-Agent Autonomy SDK Contributors"]
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[dependencies]
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
chrono = "0.4"
uuid = { version = "1.6", features = ["v4", "serde"] }
bytes = { workspace = true }
crossbeam-channel = "0.5"
regex = "1.10"
lz4 = { version = "1.24", optional = true }
snap = { version = "1", optional = true }
flate2 = { version = "1.0", optional = true }

# Internal dependencies
common = { path = "../common" }
mesh-transport = { path = "../mesh-transport", optional = true }
state-sync = { path = "../state-sync", optional = true }

[features]
default = []
compression = ["dep:lz4", "dep:snap", "dep:flate2"]
mesh = ["mesh-transport"]
sync = ["state-sync"]
full = ["compression", "mesh", "sync"]

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tempfile = "3.8"