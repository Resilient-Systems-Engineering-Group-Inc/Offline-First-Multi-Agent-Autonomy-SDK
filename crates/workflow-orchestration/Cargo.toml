[package]
name = "workflow-orchestration"
version = "0.1.0"
edition = "2021"
description = "Distributed workflow orchestration for offline-first multi-agent systems"
license = "BSD-3-Clause"
authors = ["Resilient Systems Engineering Group, Inc"]
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[dependencies]
tokio = { version = "1.0", features = ["sync", "time", "macros", "rt-multi-thread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
async-trait = "0.1"
futures = "0.3"
bytes = "1.5"
lazy_static = "1.4"
tracing = "0.1"
uuid = { version = "1.8", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
petgraph = "0.6"
dashmap = "5.5"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
mesh-transport = { path = "../mesh-transport", version = "0.3.0", optional = true }
state-sync = { path = "../state-sync", version = "0.3.0", optional = true }
distributed-planner = { path = "../distributed-planner", version = "0.3.0", optional = true }
event-driven = { path = "../event-driven", version = "0.3.0", optional = true }

[features]
default = []
transport = ["mesh-transport"]
distributed = ["state-sync", "transport"]
planning = ["distributed-planner"]
events = ["event-driven"]

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tracing-subscriber = "0.3"