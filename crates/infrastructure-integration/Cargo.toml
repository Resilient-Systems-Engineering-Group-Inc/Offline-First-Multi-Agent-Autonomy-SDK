[package]
name = "infrastructure-integration"
version = "0.1.0"
edition = "2021"
description = "Integration with infrastructure‑as‑code tools (Terraform, Ansible) for deploying multi‑agent systems"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
common = { path = "../common" }
mesh-transport = { path = "../mesh-transport" }
agent-core = { path = "../agent-core" }

[dev-dependencies]
tempfile = "3.6"

[[bench]]
name = "infra_bench"
harness = false