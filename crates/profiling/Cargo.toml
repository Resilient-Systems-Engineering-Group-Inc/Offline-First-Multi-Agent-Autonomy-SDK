[package]
name = "profiling"
version = "0.1.0"
edition = "2021"
description = "Profiling and debugging tools for distributed multi‑agent scenarios"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time", "net"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
common = { path = "../common" }
metrics = "0.21"
metrics-exporter-prometheus = "0.12"
tracing-opentelemetry = "0.21"
opentelemetry = { version = "0.21", features = ["rt-tokio", "metrics"] }
opentelemetry-otlp = "0.14"
opentelemetry-stdout = "0.10"
hyper = { version = "0.14", features = ["server", "http1", "http2", "tcp"] }

[dev-dependencies]
criterion = { workspace = true }