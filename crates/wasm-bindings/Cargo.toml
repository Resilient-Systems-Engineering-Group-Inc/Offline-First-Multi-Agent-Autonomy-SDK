[package]
name = "wasm-bindings"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Multi-Agent SDK"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
    "Window",
    "console",
    "WebSocket",
    "Request",
    "RequestInit",
    "Response"
] }
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen-futures = "0.4"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
distributed-planner = { path = "../distributed-planner", version = "0.3.0" }

[dependencies.web-sys]
version = "0.3"
features = ["Blob", "FileReader"]
