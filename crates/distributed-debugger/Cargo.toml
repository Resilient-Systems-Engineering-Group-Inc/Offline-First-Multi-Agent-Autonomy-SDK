[package]
name = "distributed-debugger"
version = "0.1.0"
edition = "2021"
description = "Debugging tools for distributed offline‑first multi‑agent systems"
license = "BSD-3-Clause"
authors = ["Resilient Systems Engineering Group, Inc"]
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[dependencies]
tokio = { version = "1.0", features = ["sync", "time", "macros", "fs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
async-trait = "0.1"
futures = "0.3"
bytes = "1.5"
lazy_static = "1.4"
tracing = "0.1"
tracing-subscriber = "0.3"
tracing-opentelemetry = "0.22"
opentelemetry = { version = "0.22", features = ["rt-tokio", "metrics", "trace"] }
dashmap = "5.5"
uuid = { version = "1.6", features = ["v4", "serde"] }
warp = "0.3"
reqwest = "0.11"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
mesh-transport = { path = "../mesh-transport", version = "0.3.0" }
state-sync = { path = "../state-sync", version = "0.3.0" }
profiling = { path = "../profiling", version = "0.3.0" }
monitoring-integration = { path = "../monitoring-integration", version = "0.1.0" }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tracing-subscriber = "0.3"