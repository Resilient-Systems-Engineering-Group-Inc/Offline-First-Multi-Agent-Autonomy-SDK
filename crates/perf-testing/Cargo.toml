[package]
name = "perf-testing"
version = "0.1.0"
edition = "2021"
description = "Performance testing framework for the Multi-Agent SDK"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
criterion = "0.5"
rayon = "1.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
prometheus = "0.13"
reqwest = { version = "0.11", features = ["json"] }

# Internal dependencies
common = { path = "../common", version = "0.3.0" }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "planner_bench"
harness = false

[[bench]]
name = "state_sync_bench"
harness = false

[[bench]]
name = "mesh_transport_bench"
harness = false
