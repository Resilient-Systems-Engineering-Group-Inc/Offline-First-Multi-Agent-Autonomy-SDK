[package]
name = "federated-learning"
version = "0.1.0"
edition = "2021"
authors = ["Resilient Systems Engineering Group, Inc"]
description = "Federated learning for the Offline‑First Multi‑Agent Autonomy SDK"
license = "BSD-3-Clause"
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[features]
default = ["encryption", "differential-privacy"]
encryption = ["homomorphic-encryption"]
differential-privacy = ["rand", "rand_distr"]

[dependencies]
tokio = { version = "1.38", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
async-trait = "0.1"
futures = "0.3"
rand = { version = "0.8", features = ["small_rng"] }
rand_distr = "0.4"

# Internal dependencies
common = { path = "../common", version = "0.3.0" }

[dev-dependencies]
tokio = { version = "1.38", features = ["full"] }
tracing-subscriber = "0.3"