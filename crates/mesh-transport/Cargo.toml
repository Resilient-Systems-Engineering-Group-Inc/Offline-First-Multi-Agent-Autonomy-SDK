[package]
name = "mesh-transport"
version = "0.2.0"
edition = "2021"
description = "Mesh transport layer for offline‑first multi‑agent systems (libp2p & in‑memory backends)"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net"] }
serde = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
bytes = { workspace = true }
common = { path = "../common" }
# Security
ed25519-dalek = { version = "2.0", features = ["serde", "rand_core"] }
rand_core = "0.6"
serde_bytes = "0.11"
bincode = "1.3"
# Encryption
chacha20poly1305 = "0.10"
aes-gcm = "0.10"
x25519-dalek = "2.0"
sha2 = "0.10"
# Networking
libp2p = { version = "0.54", default-features = false, features = [
    "tcp",
    "dns",
    "noise",
    "yamux",
    "websocket",
    "mplex",
    "mdns",
    "ping",
    "request-response",
] }

# Post‑quantum cryptography (optional)
pqcrypto-kyber = { version = "0.7", optional = true }
pqcrypto-dilithium = { version = "0.7", optional = true }
pqcrypto-falcon = { version = "0.7", optional = true }

[features]
default = []
post-quantum = ["pqcrypto-kyber", "pqcrypto-dilithium", "pqcrypto-falcon"]

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "transport_bench"
harness = false