[package]
name = "mesh-transport-fuzz"
version = "0.0.1"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1.3", features = ["derive"] }
mesh-transport = { path = ".." }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
bytes = "1.5"

[[bin]]
name = "message_serialization_fuzzer"
path = "fuzz_targets/message_serialization_fuzzer.rs"
test = false
doc = false

[[bin]]
name = "protocol_state_fuzzer"
path = "fuzz_targets/protocol_state_fuzzer.rs"
test = false
doc = false

[[bin]]
name = "encryption_fuzzer"
path = "fuzz_targets/encryption_fuzzer.rs"
test = false
doc = false
