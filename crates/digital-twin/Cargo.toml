 [package] name = "digital-twin" version = "0.1.0" edition = "2021" authors = ["Your Name <you@example.com>] description = "Digital twin simulation of the physical world for the Offline‑First Multi‑Agent Autonomy SDK" license = "MIT OR Apache-2.0" repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK" readme = "README.md" [features] default = ["visualization", "physics"] visualization = ["wgpu", "glam"] physics = ["rapier3d"] [dependencies] tokio = { version = "1.38", features = ["full"] } serde = { version = "1.0", features = ["derive"] } serde_json = "1.0" anyhow = "1.0" thiserror = "2.0" tracing = "0.1" async-trait = "0.1" futures = "0.3" wgpu = { version = "0.19", optional = true } glam = { version = "0.24", optional = true } rapier3d = { version = "0.17", optional = true } # Internal dependencies swarm-simulator = { path = "../swarm-simulator", version = "0.3" } iot-interface = { path = "../iot-interface", version = "0.1" } mesh-transport = { path = "../mesh-transport", version = "0.3" } [dev-dependencies] tokio = { version = "1.38", features = ["full"] } tempfile = "3.0" 