[package]
name = "distributed-planner"
version = "0.1.0"
edition = "2021"
description = "Distributed task planning for offline‑first multi‑agent systems"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
common = { path = "../common" }
mesh-transport = { path = "../mesh-transport" }
bounded-consensus = { path = "../bounded-consensus" }
state-sync = { path = "../state-sync" }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
criterion = { workspace = true }

[[bench]]
name = "planning_bench"
harness = false