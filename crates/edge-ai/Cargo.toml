[package]
name = "edge-ai"
version = "0.1.0"
edition = "2021"
description = "Edge AI inference for the Multi-Agent SDK"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
ndarray = "0.15"
ort = "1.16"
tflite = "0.7"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

# Internal dependencies
common = { path = "../common", version = "0.3.0" }

[dev-dependencies]
tempfile = "3.8"
