[package]
name = "state-sync"
version = "0.2.0"
edition = "2021"
description = "CRDT‑based state synchronization with delta compression, batching, and deduplication"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
common = { path = "../common" }

# CRDT library
crdts = { version = "8.0", features = ["serde"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "crdt_map"
harness = false