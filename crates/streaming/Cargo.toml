[package]
name = "streaming"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <you@example.com>"]
description = "Streaming data channels for real‑time communication between agents"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[features]
default = ["compression", "metrics"]
compression = ["flate2", "lz4"]
metrics = ["prometheus"]

[dependencies]
tokio = { version = "1.38", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
async-trait = "0.1"
futures = "0.3"
bytes = "1.5"
flate2 = { version = "1.0", optional = true }
lz4 = { version = "1.24", optional = true }
prometheus = { version = "0.13", optional = true }
dashmap = "5.5"
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"

# Internal dependencies
mesh-transport = { path = "../mesh-transport", version = "0.3" }
common = { path = "../common", version = "0.3" }

[dev-dependencies]
tokio = { version = "1.38", features = ["full"] }
tempfile = "3.0"