[package]
name = "rbac"
version = "0.1.0"
edition = "2021"
description = "Role‑Based Access Control (RBAC) for offline‑first multi‑agent systems"
license = "BSD-3-Clause"
authors = ["Resilient Systems Engineering Group, Inc"]
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[dependencies]
tokio = { version = "1.0", features = ["sync", "time", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
async-trait = "0.1"
futures = "0.3"
lazy_static = "1.4"
tracing = "0.1"
dashmap = "5.5"
uuid = { version = "1.6", features = ["v4", "serde"] }

# Internal dependencies
common = { path = "../common", version = "0.3.0" }
mesh-transport = { path = "../mesh-transport", version = "0.3.0" }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tracing-subscriber = "0.3"