[package]
name = "rl-planner"
version = "0.1.0"
edition = "2021"
authors = ["Your Name"]
description = "Reinforcement learning for adaptive task planning in multi‑agent systems"
license = "MIT OR Apache-2.0"
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
async-trait = "0.1"
thiserror = "1.0"
tracing = "0.1"
ndarray = "0.15"
rand = "0.8"
distributed-planner = { path = "../distributed-planner" }
common = { path = "../common" }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tempfile = "3.0"