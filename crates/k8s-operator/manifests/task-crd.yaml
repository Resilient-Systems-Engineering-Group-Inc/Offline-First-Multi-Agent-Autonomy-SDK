apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.autonomy.sdk
spec:
  group: autonomy.sdk
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                description:
                  type: string
                requiredCapabilities:
                  type: array
                  items:
                    type: string
                priority:
                  type: integer
                deadlineSeconds:
                  type: integer
                payload:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                assignedAgent:
                  type: string
                result:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                lastUpdated:
                  type: string
  scope: Namespaced
  names:
    plural: tasks
    singular: task
    kind: Task
    shortNames:
      - tk