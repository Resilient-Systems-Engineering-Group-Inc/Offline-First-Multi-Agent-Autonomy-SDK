apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.autonomy.sdk
spec:
  group: autonomy.sdk
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                agentId:
                  type: string
                capabilities:
                  type: array
                  items:
                    type: string
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    storage:
                      type: string
                transport:
                  type: object
                  properties:
                    interface:
                      type: string
                    port:
                      type: integer
                    bootstrapPeers:
                      type: array
                      items:
                        type: string
            status:
              type: object
              properties:
                state:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                lastUpdated:
                  type: string
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ag