[package]
name = "k8s-operator"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <you@example.com>"]
description = "Kubernetes operator for managing offline-first multi-agent autonomy SDK"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[features]
default = []

[dependencies]
kube = { version = "0.90", features = ["runtime", "derive"] }
k8s-openapi = { version = "0.21", features = ["v1_28"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tracing = { version = "0.1", features = ["attributes"] }
tracing-subscriber = "0.3"
futures = "0.3"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
schemars = "0.8"

# Internal dependencies
agent-core = { path = "../agent-core", version = "0.3", optional = true }
mesh-transport = { path = "../mesh-transport", version = "0.3", optional = true }
state-sync = { path = "../state-sync", version = "0.3", optional = true }

[dev-dependencies]
tempfile = "3.0"

[package.metadata.docs.rs]
all-features = true