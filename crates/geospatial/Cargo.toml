[package]
name = "geospatial"
version = "0.1.0"
edition = "2021"
description = "Geolocation and spatial planning for offline-first multi-agent systems"
license = "MIT OR Apache-2.0"
authors = ["Offline-First Multi-Agent Autonomy SDK Contributors"]
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[dependencies]
tokio = { workspace = true, features = ["sync", "time", "macros"] }
serde = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }

# For geospatial calculations
geo = { version = "0.26", features = ["use-rstar", "proj"] }
rstar = "0.11"
proj = { version = "0.30", optional = true }
haversine = "0.3"
kdtree = "0.6"

# Internal dependencies
common = { path = "../common" }
mesh-transport = { path = "../mesh-transport" }
agent-core = { path = "../agent-core" }

[features]
default = []
proj = ["dep:proj"]

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tracing-subscriber = { workspace = true }