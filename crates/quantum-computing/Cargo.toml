[package]
name = "quantum-computing"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <you@example.com>"]
description = "Quantum computing integration for the Offline‑First Multi‑Agent Autonomy SDK"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[features]
default = ["simulation"]
simulation = ["qrust"]
hardware = ["qiskit-rs"]

[dependencies]
tokio = { version = "1.38", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
async-trait = "0.1"
futures = "0.3"
qrust = { git = "https://github.com/example/qrust", optional = true }
qiskit-rs = { git = "https://github.com/example/qiskit-rs", optional = true }

# Internal dependencies
agent-core = { path = "../agent-core", version = "0.3" }
distributed-planner = { path = "../distributed-planner", version = "0.3" }

[dev-dependencies]
tokio = { version = "1.38", features = ["full"] }
tempfile = "3.0"