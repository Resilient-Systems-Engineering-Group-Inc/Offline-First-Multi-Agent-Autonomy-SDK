[package]
name = "ml-model-versioning"
version = "0.1.0"
edition = "2021"
description = "ML model versioning system for federated learning and RL planning"
license = "MIT OR Apache-2.0"
authors = ["Offline-First Multi-Agent Autonomy SDK Contributors"]
repository = "https://github.com/your-org/Offline-First-Multi-Agent-Autonomy-SDK"
readme = "README.md"

[dependencies]
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
chrono = "0.4"
semver = "1.0"
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
uuid = { version = "1.3", features = ["v4", "serde"] }

# Internal dependencies
common = { path = "../common" }
federated-learning = { path = "../federated-learning", optional = true }
rl-planner = { path = "../rl-planner", optional = true }
distributed-kv = { path = "../distributed-kv", optional = true }
data-versioning = { path = "../data-versioning", optional = true }

[features]
default = []
federated = ["dep:federated-learning"]
rl = ["dep:rl-planner"]
storage = ["dep:distributed-kv", "dep:data-versioning"]
full = ["federated", "rl", "storage"]

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tempfile = "3.8"