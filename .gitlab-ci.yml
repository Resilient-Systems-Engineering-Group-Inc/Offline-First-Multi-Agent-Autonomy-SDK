# GitLab CI/CD configuration for Offline-First Multi-Agent Autonomy SDK
# This configuration runs on GitLab's shared runners with Rust support

image: rust:latest

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "short"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

stages:
  - build
  - test
  - lint
  - security
  - benchmarks
  - coverage
  - deploy

before_script:
  - rustc --version
  - cargo --version

# Build stage
build:
  stage: build
  script:
    - cargo build --workspace --verbose
  artifacts:
    paths:
      - target/debug/
    expire_in: 1 week

# Test stage
test:
  stage: test
  script:
    - cargo test --workspace --verbose
  artifacts:
    paths:
      - target/debug/deps/
    expire_in: 1 week

# Lint stage
lint:
  stage: lint
  script:
    - rustup component add clippy
    - cargo clippy --workspace -- -D warnings
    - rustup component add rustfmt
    - cargo fmt -- --check

# Security stage
security:
  stage: security
  script:
    - apt-get update && apt-get install -y curl
    # Cargo audit
    - cargo install cargo-audit --version 0.18.0
    - cargo audit
    # Cargo deny (optional, install if needed)
    - curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/download/0.14.3/cargo-deny-0.14.3-x86_64-unknown-linux-musl.tar.gz | tar -xz
    - ./cargo-deny-0.14.3-x86_64-unknown-linux-musl/cargo-deny check
  allow_failure: true  # Security failures don't block pipeline but are reported

# Benchmarks stage (run only on main branch or tags)
benchmarks:
  stage: benchmarks
  script:
    - cargo install cargo-criterion
    - cargo criterion --workspace --message-format=json | tee benchmark-results.json
  artifacts:
    paths:
      - benchmark-results.json
    expire_in: 1 month
  only:
    - main
    - develop
    - tags

# Coverage stage
coverage:
  stage: coverage
  script:
    - cargo install cargo-tarpaulin --version 0.26.0
    - cargo tarpaulin --workspace --out Xml --output-dir ./coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 month
  coverage: '/^\s*lines:\s*\d+\.\d+%/'

# Deploy stage (example for crates.io)
deploy-crates:
  stage: deploy
  script:
    - echo "Deploying to crates.io"
    # Only publish if tag matches version
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        cargo publish --token $CARGO_REGISTRY_TOKEN
      else
        echo "Not a version tag, skipping publish"
      fi
  only:
    - tags
  when: manual  # Require manual trigger for safety

# Pages deployment (for documentation)
pages:
  stage: deploy
  script:
    - cargo doc --workspace --no-deps
    - mkdir public
    - cp -r target/doc/* public/
  artifacts:
    paths:
      - public
  only:
    - main